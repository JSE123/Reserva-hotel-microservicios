server:
  port: 8081

spring:
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

      # routes:
      #   - id: booking-service
      #     uri: http://localhost:8084
      #     predicates:
      #       - Path=/booking/**
      #     filters:
      #       - StripPrefix=1
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://localhost:8082/oauth2/jwks
logging:
  level:
    org:
      springframework:
        security: DEBUG
        cloud:
          gateway: TRACE
        http:
          server:
            reactive: DEBUG
        web:
          reactive: DEBUG

management:
  endpoints:
    gateway:
      enabled: true
    web:
      exposure:
        include: gateway, health, info