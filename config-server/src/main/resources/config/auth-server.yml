server:
    port: 8082
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/hotel_auth_db
    username: postgres
    password: 1234
    driver-class-name: org.postgresql.Driver
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    hibernate:
      ddl-auto: update
    generate-ddl: false
    show-sql: true

  

